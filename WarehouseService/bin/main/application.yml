spring:
# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
  application:
    name: WarehouseService
  mvc:
    problemdetails:
      enabled: true

# ============================================================
# DATABASE CONFIGURATION
# ============================================================
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true

# ============================================================
# SWAGGER CONFIGURATION
# ============================================================
springdoc:
  api-docs.path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server:
  port: 8081
  address: 0.0.0.0